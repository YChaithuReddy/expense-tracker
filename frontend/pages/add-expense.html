<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Expense - Expense Tracker</title>
  <link rel="stylesheet" href="../css/index.css">
</head>
<body>
  <!-- SIDEBAR NAVIGATION -->
  <aside class="sidebar">
    <!-- Sidebar Header -->
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">C</div>
        <span>Curator</span>
      </div>
    </div>

    <!-- Sidebar Navigation -->
    <nav class="sidebar-nav">
      <a href="../dashboard.html" class="sidebar-nav-item">
        <div class="sidebar-nav-icon">📊</div>
        <span class="sidebar-nav-label">Dashboard</span>
      </a>
      <a href="./add-expense.html" class="sidebar-nav-item active">
        <div class="sidebar-nav-icon">➕</div>
        <span class="sidebar-nav-label">Add Expense</span>
      </a>
      <a href="#" class="sidebar-nav-item">
        <div class="sidebar-nav-icon">🏦</div>
        <span class="sidebar-nav-label">Advances</span>
      </a>
      <a href="#" class="sidebar-nav-item">
        <div class="sidebar-nav-icon">📄</div>
        <span class="sidebar-nav-label">Reports</span>
      </a>
    </nav>

    <!-- Sidebar Footer -->
    <div class="sidebar-footer">
      <a href="#" class="sidebar-footer-item">
        <div class="sidebar-footer-icon">⚙️</div>
        <span class="sidebar-nav-label">Settings</span>
      </a>
      <a href="#" class="sidebar-footer-item">
        <div class="sidebar-footer-icon">🚪</div>
        <span class="sidebar-nav-label">Logout</span>
      </a>
    </div>
  </aside>

  <!-- MAIN CONTAINER -->
  <div class="main-container">
    <!-- HEADER / TOP BAR -->
    <header class="header">
      <!-- Hamburger Menu Button (Mobile) -->
      <button class="hamburger-btn" id="hamburger-btn">☰</button>

      <!-- Search Bar -->
      <div class="header-search">
        <div class="header-search-icon">🔍</div>
        <input type="text" class="header-search-input" placeholder="Search expenses...">
      </div>

      <!-- User Profile -->
      <div class="header-user">
        <div class="header-user-avatar">JD</div>
        <div class="header-user-info">
          <div class="header-user-name">John Doe</div>
          <div class="header-user-email">john@example.com</div>
        </div>
      </div>
    </header>

    <!-- MAIN CONTENT AREA -->
    <main class="main-content">
      <div class="page-wrapper">
        <!-- Page Header -->
        <div class="page-header">
          <h1 class="page-title">Add Expense</h1>
          <p class="page-subtitle">Record a new expense</p>
        </div>

        <!-- Tab Navigation -->
        <div class="tabs">
          <button class="tab-button active" data-tab="quick-add">Quick Add</button>
          <button class="tab-button" data-tab="scan-receipt">Scan Receipt</button>
          <button class="tab-button" data-tab="upi-import">UPI Import</button>
        </div>

        <!-- Tab Panels -->
        <div class="tab-panel active" id="quick-add">
          <div class="card" style="margin-bottom: var(--spacing-xl);">
            <div class="card-body">
              <form id="quick-add-form" class="quick-add-form" novalidate>
                <!-- Description / Merchant -->
                <div class="form-group">
                  <label class="form-label required" for="expense-description">Description / Merchant</label>
                  <input type="text" id="expense-description" name="description"
                         placeholder="Enter vendor or description (e.g., Starbucks, Rent)"
                         minlength="3" required>
                  <span class="form-error-message" id="description-error"></span>
                </div>

                <!-- Amount -->
                <div class="form-group">
                  <label class="form-label required" for="expense-amount">Amount</label>
                  <div class="input-with-prefix">
                    <span class="input-prefix">&#8377;</span>
                    <input type="number" id="expense-amount" name="amount"
                           placeholder="Enter amount"
                           min="0.01" step="0.01" required>
                  </div>
                  <span class="form-error-message" id="amount-error"></span>
                </div>

                <!-- Category -->
                <div class="form-group">
                  <label class="form-label required" for="expense-category">Category</label>
                  <select id="expense-category" name="category" required>
                    <option value="" disabled selected>Select a category</option>
                    <option value="food">Food</option>
                    <option value="travel">Travel</option>
                    <option value="utilities">Utilities</option>
                    <option value="entertainment">Entertainment</option>
                    <option value="shopping">Shopping</option>
                    <option value="other">Other</option>
                  </select>
                  <span class="form-error-message" id="category-error"></span>
                </div>

                <!-- Payment Method -->
                <div class="form-group">
                  <label class="form-label">Payment Method</label>
                  <div class="radio-group">
                    <label class="radio-label">
                      <input type="radio" name="payment-method" value="cash" checked>
                      <span class="radio-custom"></span>
                      <span>Cash</span>
                    </label>
                    <label class="radio-label">
                      <input type="radio" name="payment-method" value="debit-card">
                      <span class="radio-custom"></span>
                      <span>Debit Card</span>
                    </label>
                    <label class="radio-label">
                      <input type="radio" name="payment-method" value="credit-card">
                      <span class="radio-custom"></span>
                      <span>Credit Card</span>
                    </label>
                    <label class="radio-label">
                      <input type="radio" name="payment-method" value="upi">
                      <span class="radio-custom"></span>
                      <span>UPI</span>
                    </label>
                    <label class="radio-label">
                      <input type="radio" name="payment-method" value="other">
                      <span class="radio-custom"></span>
                      <span>Other</span>
                    </label>
                  </div>
                </div>

                <!-- Notes -->
                <div class="form-group">
                  <label class="form-label" for="expense-notes">Notes</label>
                  <textarea id="expense-notes" name="notes"
                            placeholder="Add any notes..."
                            maxlength="200" rows="3"></textarea>
                  <span class="form-char-count"><span id="notes-char-count">0</span>/200</span>
                </div>

                <!-- Submit Button -->
                <div class="form-actions">
                  <button type="submit" class="btn btn-primary btn-lg" id="quick-add-submit">
                    Add Expense
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <div class="tab-panel" id="scan-receipt">
          <div class="card" style="margin-bottom: var(--spacing-xl);">
            <div class="card-body">
              <!-- Scan Receipt Content (Task 12) -->
              <p style="color: var(--color-text-secondary); font-size: var(--font-size-body-sm); margin: 0;">
                Receipt OCR upload will be implemented in Task 12.
              </p>
            </div>
          </div>
        </div>

        <div class="tab-panel" id="upi-import">
          <div class="card" style="margin-bottom: var(--spacing-xl);">
            <div class="card-body">
              <!-- UPI Import Content (Task 13) -->
              <p style="color: var(--color-text-secondary); font-size: var(--font-size-body-sm); margin: 0;">
                UPI app integration will be implemented in Task 13.
              </p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // Tab Navigation Functionality
    document.addEventListener('DOMContentLoaded', function() {
      // Mobile hamburger menu functionality
      const hamburgerBtn = document.getElementById('hamburger-btn');
      const sidebar = document.querySelector('.sidebar');

      if (hamburgerBtn) {
        hamburgerBtn.addEventListener('click', function(e) {
          e.preventDefault();
          sidebar.classList.toggle('open');
        });
      }

      // Close sidebar when clicking outside
      document.addEventListener('click', function(e) {
        if (sidebar && sidebar.classList.contains('open')) {
          if (!sidebar.contains(e.target) && !hamburgerBtn.contains(e.target)) {
            sidebar.classList.remove('open');
          }
        }
      });

      // Tab switching functionality
      const tabButtons = document.querySelectorAll('.tab-button');
      const tabPanels = document.querySelectorAll('.tab-panel');

      tabButtons.forEach(button => {
        button.addEventListener('click', function(e) {
          e.preventDefault();

          const tabId = this.getAttribute('data-tab');

          // Remove active class from all buttons and panels
          tabButtons.forEach(btn => btn.classList.remove('active'));
          tabPanels.forEach(panel => panel.classList.remove('active'));

          // Add active class to clicked button
          this.classList.add('active');

          // Add active class to corresponding panel
          const activePanel = document.getElementById(tabId);
          if (activePanel) {
            activePanel.classList.add('active');
          }
        });
      });

      // Notes character counter
      const notesField = document.getElementById('expense-notes');
      const charCount = document.getElementById('notes-char-count');
      if (notesField && charCount) {
        notesField.addEventListener('input', function() {
          charCount.textContent = this.value.length;
        });
      }

      // Logout button handler
      const logoutBtn = document.querySelector('.sidebar-footer-item:last-child');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', (e) => {
          e.preventDefault();
          // TODO: Implement logout functionality
        });
      }
    });
  </script>
</body>
</html>

name: expense_tracker
description: Modern fintech expense tracking app with OCR bill scanning and UPI integration.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  google_fonts: ^6.0.0
  material_color_utilities: ^0.8.0

  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0

  # Networking & API
  http: ^1.1.0
  dio: ^5.3.0

  # Authentication
  supabase_flutter: ^1.10.0
  google_sign_in: ^6.1.0

  # Image Handling & OCR
  image_picker: ^1.0.0
  camera: ^0.10.0
  google_mlkit_text_recognition: ^0.6.0

  # PDF & Export
  pdf: ^3.10.0
  excel: ^2.1.0

  # Local Storage
  shared_preferences: ^2.2.0
  sqflite: ^2.3.0
  hive: ^2.2.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.0.0
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logos/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
